<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Inventory - Nexus Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white p-3" style="min-width: 250px; min-height: 100vh;">
            <h3 class="text-warning fst-italic mb-4">Tulasi Grand Admin</h3>
            <ul class="nav flex-column gap-2">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link text-white-50 hover-light">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link active text-white bg-primary rounded">
                        <i class="bi bi-houses me-2"></i> Manage Rooms
                    </a>
                </li>
                <li class="nav-item">
                    <a href="history.html" class="nav-link text-white-50 hover-light">
                        <i class="bi bi-clock-history me-2"></i> Booking History
                    </a>
                </li>
                <li class="nav-item">
                    <a href="offers.html" class="nav-link text-white-50 hover-light">
                        <i class="bi bi-tags me-2"></i> Offers & Coupons
                    </a>
                </li>
                <li class="nav-item">
                    <a href="settings.html" class="nav-link text-white-50 hover-light">
                        <i class="bi bi-gear me-2"></i> Settings
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <button id="adminLogout" class="btn btn-outline-danger w-100 text-start">
                        <i class="bi bi-box-arrow-left me-2"></i> Logout
                    </button>
                </li>
            </ul>
        </div>

        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Room Inventory</h2>
                <button class="btn btn-primary" onclick="openRoomModal()">
                    <i class="bi bi-plus-lg"></i> Add New Room
                </button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Image</th>
                                <th>Room No</th>
                                <th>Type</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Add Room</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="roomForm">
                        <input type="hidden" id="editRoomId">
                        <div class="mb-3">
                            <label class="form-label">Room Number</label>
                            <input type="text" class="form-control" id="roomNo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Room Type</label>
                            <select class="form-select" id="roomType" required>
                                <option value="Deluxe Room">Deluxe Room</option>
                                <option value="Suite">Suite</option>
                                <option value="Double Room">Double Room</option>
                                <option value="Single Room">Single Room</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price per Night ($)</label>
                            <input type="number" class="form-control" id="roomPrice" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Room Image</label>

                            <input type="file" class="form-control" id="roomImageFile" accept="image/*">

                            <input type="hidden" id="roomImageBase64">

                            <div class="mt-2">
                                <img id="imagePreview" src="" style="max-height: 100px; display: none;"
                                    class="img-thumbnail">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Current Status</label>
                            <select class="form-select" id="roomStatus">
                                <option value="Available">Available</option>
                                <option value="Booked">Booked</option>
                                <option value="Maintenance">Maintenance</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="saveBtn">Save Room</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="inventory.js"></script>
</body>

</html>
