<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Tulasi Grand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="homePage.html">Tulasi Grand</a>
             <div class="ms-auto">
                <a href="homePage.html" class="btn btn-outline-light">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Get In Touch</h2>
            <p class="text-muted">We'd love to hear from you. Our team is always here to chat.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4 h-100 bg-primary text-white">
                    <h4 class="mb-4">Contact Information</h4>
                    
                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-geo-alt-fill fs-3 me-3"></i>
                        <div>
                            <h6 class="mb-0">Address</h6>
                            <p class="mb-0 small text-white-50">123 Luxury Lane, Hyderabad, India</p>
                        </div>
                    </div>

                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-envelope-fill fs-3 me-3"></i>
                        <div>
                            <h6 class="mb-0">Email</h6>
                            <p class="mb-0 small text-white-50">support@tulasigrand.com</p>
                        </div>
                    </div>

                    <div class="d-flex align-items-center">
                        <i class="bi bi-telephone-fill fs-3 me-3"></i>
                        <div>
                            <h6 class="mb-0">Phone</h6>
                            <p class="mb-0 small text-white-50">+91 987 654 3210</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="John">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="john@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="5" placeholder="How can we help you?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
